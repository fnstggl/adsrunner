<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 1080px;
            height: 1350px;
            overflow: hidden;
            margin: 0;
            padding: 0;
            background: transparent;
        }
        /* @font-face rules will be injected here */
    </style>
</head>
<body>
<div style="
            position: absolute;
            left: 66px;
            top: 116px;
            width: 900px;
            text-align: center;
            
        ">
            <div style="
                font-family: 'Inter';
                font-size: 24px;
                font-weight: 600;
                color: #999999;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                margin-bottom: 12px;
                text-align: center;
            ">
                PREMIUM WORKSPACE
            </div>
<div style="
            font-family: 'Inter';
            font-size: 90px;
            font-weight: 700;
            line-height: 1.0;
            color: #FFFFFF;
            max-width: 900px;
            margin: 0 auto 12px;
            text-align: center;
        ">
            <span>Transform Your Home Into</span><br><span>A Productivity Powerhouse</span>
        </div>
<div style="
                font-family: 'Inter';
                font-size: 48px;
                font-weight: 400;
                line-height: 1.4;

                max-width: 900px;
                margin: 0 auto 16px;
                text-align: center;
            ">
                Modern lighting and ergonomic design that actually makes remote work enjoyable
            </div>
<button style="
                margin-top: 16px;
                padding: 12px 24px;
                font-family: 'Inter';
                font-size: 44px;
                font-weight: 700;
                color: #FFFFFF;
                background: #FF6B35;
                border: none;
                border-radius: 999px;
                cursor: pointer;
                text-transform: uppercase;
            ">Shop Now</button>
        </div>

</html>
